<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Chat - MAEMATH 2214</title>
    <link rel="stylesheet" href="css/style.css">
    <script type="module" src="js/guard.js"></script>
    <style>
        .chat-container {
            height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #f8fafc;
        }
        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            position: relative;
        }
        .message.mine {
            align-self: flex-end;
            background-color: #2b6cb0;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .message.others {
            align-self: flex-start;
            background-color: #edf2f7;
            color: #2d3748;
            border-bottom-left-radius: 2px;
            border: 1px solid #e2e8f0;
        }
        .message-info {
            font-size: 0.7rem;
            margin-bottom: 4px;
            display: block;
            font-weight: bold;
        }
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
        }
        #message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-brand">MAEMATH 2214</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="materials.html">Materials</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="chat.html" class="active">Chat</a></li>
        </ul>
        <button id="logout-btn" class="btn-outline">Logout</button>
    </nav>

    <main class="dashboard-container">
        <header class="page-header">
            <h1>Class Group Chat</h1>
            <p>Real-time discussion with your classmates.</p>
        </header>

        <div class="chat-container">
            <div id="chat-window">
                <p style="text-align: center; color: gray;">Loading conversation...</p>
            </div>
            <form id="chat-form" class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" class="btn primary-btn">Send</button>
            </form>
        </div>
    </main>

    <script type="module" src="js/chat.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
