<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Dept | Portal Access</title>
    <link rel="stylesheet" href="src/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="center-layout">

    <div class="auth-card">
        <div class="header">
            <h1>Math Dept Portal</h1>
            <p>Sign in or create an account</p>
        </div>
        
        <form id="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="teacher@school.edu" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="button-group">
                <button type="button" id="login-btn" class="primary-btn">Login</button>
                <button type="button" id="register-btn" class="secondary-btn">Register</button>
            </div>
            
            <div id="auth-message" class="hidden"></div>
        </form>
    </div>

    </body>
</html>
